<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silo Monitor – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1e3a5f;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #10b981;
      --red: #ef4444;
      --text: #f1f5f9;
      --muted: #64748b;
      --subtle: #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 40%, rgba(59,130,246,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 70% 70%, rgba(16,185,129,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.08);
      position: relative;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      box-shadow: 0 4px 16px rgba(59,130,246,0.3);
    }

    .logo-text { font-size: 1.2rem; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .logo-sub { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    h2 {
      font-size: 1.5rem; font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #f1f5f9, #94a3b8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .subtitle { font-size: 0.85rem; color: var(--muted); margin-bottom: 32px; }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 0.78rem; font-weight: 600;
      color: var(--subtle);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    /* PIN dots styling */
    input[type="password"] {
      letter-spacing: 6px;
      font-size: 1.2rem;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }

    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hint {
      text-align: center;
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .hint strong { color: var(--subtle); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🌾</div>
      <div>
        <div class="logo-text">Silo Monitor</div>
        <div class="logo-sub">Grain Storage Intelligence</div>
      </div>
    </div>

    <h2>Welcome back</h2>
    <div class="subtitle">Sign in to your monitoring dashboard</div>

    <div class="error" id="errorMsg"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
      </div>
      <div class="field">
        <label>PIN</label>
        <input type="password" id="pin" placeholder="••••" maxlength="8" autocomplete="current-password" required>
      </div>
      <button class="btn" type="submit" id="loginBtn">
        <span class="btn-inner">
          <span class="spinner" id="spinner"></span>
          <span id="btnText">Sign In</span>
        </span>
      </button>
    </form>

    <div class="hint">Default admin: <strong>admin</strong> / PIN: <strong>0000</strong></div>
  </div>

  <script>
    // If already logged in, redirect
    const session = JSON.parse(localStorage.getItem('siloSession') || 'null');
    if (session && session.farmerId) {
      window.location.href = '/';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const pin = document.getElementById('pin').value.trim();
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const errorMsg = document.getElementById('errorMsg');

      errorMsg.style.display = 'none';
      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, pin })
        });
        const data = await res.json();

        if (!res.ok || !data.success) {
          throw new Error(data.error || 'Login failed');
        }

        localStorage.setItem('siloSession', JSON.stringify({
          farmerId: data.farmerId,
          username: data.username,
          role: data.role
        }));

        // Redirect to dashboard
        window.location.href = '/';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
